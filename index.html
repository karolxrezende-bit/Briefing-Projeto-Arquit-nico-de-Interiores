<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto de Arquitetura de Interiores</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f11;
      color: #ffffff;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: linear-gradient(135deg, #1a1a1d, #2a2a30);
      padding: 40px;
      border-radius: 20px;
      margin-bottom: 30px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 32px;
    }

    p {
      opacity: 0.8;
      max-width: 600px;
    }

    .badge {
      margin-top: 20px;
      display: inline-block;
      background: #2a2a30;
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 14px;
    }

    .progress {
      background: #1a1a1d;
      padding: 20px;
      border-radius: 15px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .section {
      background: #1a1a1d;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #2a2a30;
      color: #fff;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
      display: block;
    }

    .full {
      grid-column: span 2;
    }

    button {
      background: #6c2bd9;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <header>
      <h1>Projeto de Arquitetura de Interiores</h1>
      <p>
        Briefing completo para reforma de apartamento. Preencha com calma.
        Quanto mais detalhado, melhor será o desenvolvimento do projeto.
      </p>

      <div class="badge">
        Preenchimento online + exportação em PDF
      </div>
    </header>

    <!-- PROGRESSO -->
    <div class="progress">
      <span>Progresso do briefing</span>
      <span>0% preenchido</span>
    </div>

    <!-- INFORMAÇÕES GERAIS -->
    <div class="section">
      <h2>1. Informações gerais</h2>

      <div class="grid">

        <div>
          <label>Nome do cliente</label>
          <input type="text">
        </div>

        <div>
          <label>Telefone</label>
          <input type="text">
        </div>

        <div>
          <label>E-mail</label>
          <input type="email">
        </div>

        <div>
          <label>Endereço atual</label>
          <input type="text">
        </div>

        <div>
          <label>Endereço do imóvel</label>
          <input type="text">
        </div>

        <div>
          <label>Metragem aproximada</label>
          <input type="text">
        </div>

        <div>
          <label>Tipo de imóvel</label>
          <select>
            <option>Selecione</option>
            <option>Apartamento</option>
            <option>Casa</option>
          </select>
        </div>

        <div>
          <label>Prazo ideal</label>
          <input type="text">
        </div>

      </div>
    </div>

    <!-- INVESTIMENTO -->
    <div class="section">
      <h2>2. Investimento</h2>

      <div class="grid">

        <div>
          <label>Orçamento estimado (R$)</label>
          <input type="number" placeholder="R$ 0,00">
        </div>

        <div>
          <label>Tipo de financiamento</label>
          <select>
            <option>Selecione</option>
            <option>Recursos próprios</option>
            <option>Financiamento Caixa Econômica</option>
          </select>
        </div>

      </div>
    </div>

    <!-- BOTÃO -->
    <button>Salvar em PDF</button>

  </div>

</body>
</html>
